---
version: "3.9"
services:
  data-manager:
    image: ${AWS_ECR_DATA_MANAGER_SERVER_IMAGE_ARN}
    ports:
      - 8080:8080
    networks:
      - app-network
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/health
      interval: 30s
      timeout: 5s
      retries: 3
  portfolio-manager:
    image: ${AWS_ECR_PORTFOLIO_MANAGER_SERVER_IMAGE_ARN}
    ports:
      - 8081:8080
    environment:
      - FUND_DATAMANAGER_BASE_URL=http://data-manager:8080
      - FUND_ENSEMBLE_MANAGER_BASE_URL=http://ensemble-manager:8080
    networks:
      - app-network
    depends_on:
      - data-manager
      - ensemble-manager
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/health
      interval: 30s
      timeout: 5s
      retries: 3
  ensemble-manager:
    image: ${AWS_ECR_ENSEMBLE_MANAGER_SERVER_IMAGE_ARN}
    ports:
      - 8082:8080
    environment:
      - FUND_DATAMANAGER_BASE_URL=http://data-manager:8080
      - DISABLE_DISK_CACHE=1
    networks:
      - app-network
    depends_on:
      - data-manager
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/health
      interval: 30s
      timeout: 5s
      retries: 3
networks:
  app-network:
    driver: bridge
