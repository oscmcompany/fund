---
name: Run code checks
run-name: Run code checks
on:
  pull_request:
  # Allows for Rust cache to be established on master branch
  push:
    branches:
      - master
permissions:
  contents: read
  pull-requests: read
  statuses: write
jobs:
  detect_changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      markdown: ${{ steps.filter.outputs.markdown }}
      yaml: ${{ steps.filter.outputs.yaml }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'maskfile.md'
              - '.flox/**'
              - 'devenv.*'
            python:
              - '**/*.py'
              - '**/pyproject.toml'
              - 'uv.lock'
              - 'maskfile.md'
              - '.flox/**'
              - 'devenv.*'
            markdown:
              - '**/*.md'
            yaml:
              - '**/*.yaml'
              - '**/*.yml'
  run_rust_code_checks:
    name: Run Rust code checks
    needs: detect_changes
    if: needs.detect_changes.outputs.rust == 'true' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "Disk space after cleanup:"
          df -h
      - name: Install DuckDB system library
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/download/v1.5.0/libduckdb-linux-amd64.zip
          unzip libduckdb-linux-amd64.zip -d /tmp/duckdb
          sudo mv /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo mv /tmp/duckdb/*.h /usr/local/include/
          sudo ldconfig
          rm -rf /tmp/duckdb libduckdb-linux-amd64.zip
      - name: Install Flox
        uses: flox/install-flox-action@v2
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: false
          shared-key: rust-continuous-integration
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Run Rust code checks
        uses: flox/activate-action@v1
        with:
          command: mask development rust all
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: rust
          file: .coverage_output/rust.xml
          parallel: true
  run_python_code_checks:
    name: Run Python code checks
    needs: detect_changes
    if: needs.detect_changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Flox
        uses: flox/install-flox-action@v2
      - name: Run Python code checks
        uses: flox/activate-action@v1
        with:
          command: mask development python all
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: python
          file: .coverage_output/python.xml
          parallel: true
  run_markdown_code_checks:
    name: Run Markdown code checks
    needs: detect_changes
    if: needs.detect_changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Flox
        uses: flox/install-flox-action@v2
      - name: Run Markdown code checks
        uses: flox/activate-action@v1
        with:
          command: mask development markdown all
  run_yaml_code_checks:
    name: Run YAML code checks
    needs: detect_changes
    if: needs.detect_changes.outputs.yaml == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Flox
        uses: flox/install-flox-action@v2
      - name: Run YAML code checks
        uses: flox/activate-action@v1
        with:
          command: mask development yaml all
  finish_coverage_upload:
    name: Finish Coveralls coverage upload
    needs:
      - run_rust_code_checks
      - run_python_code_checks
    if: |
      always() &&
      (
        needs.run_rust_code_checks.result == 'success' ||
        needs.run_python_code_checks.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Finalize coverage upload
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          carryforward: rust,python
  verify_all_checks_passed:
    name: Verify all checks passed
    needs:
      - detect_changes
      - run_rust_code_checks
      - run_python_code_checks
      - run_markdown_code_checks
      - run_yaml_code_checks
      - finish_coverage_upload
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.detect_changes.result }}"
            "${{ needs.run_rust_code_checks.result }}"
            "${{ needs.run_python_code_checks.result }}"
            "${{ needs.run_markdown_code_checks.result }}"
            "${{ needs.run_yaml_code_checks.result }}"
            "${{ needs.finish_coverage_upload.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "A required job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "All checks passed or were skipped"
