---
name: Run code checks
run-name: Run code checks
on:
  pull_request:
  push:
    branches:
      - master
permissions:
  contents: read
  pull-requests: read
  statuses: write
jobs:
  run_code_checks:
    name: Run code checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://nixpkgs-unfree.cachix.org https://nix-community.cachix.org
            extra-trusted-public-keys = nixpkgs-unfree.cachix.org-1:hqvoInulhbV4nJ9yJOEr+4wxhDV4xq2d1DK7S6Nj6rs=
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: false
          shared-key: rust-continuous-integration
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Run all code checks
        run: devenv tasks run --mode before checks:ci
      - name: Upload Rust coverage to Coveralls
        if: hashFiles('.coverage_output/rust.xml') != ''
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: rust
          file: .coverage_output/rust.xml
          parallel: true
      - name: Upload Python coverage to Coveralls
        if: hashFiles('.coverage_output/python.xml') != ''
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: python
          file: .coverage_output/python.xml
          parallel: true
      - name: Finalize coverage upload
        if: hashFiles('.coverage_output/rust.xml') != '' || hashFiles('.coverage_output/python.xml') != ''
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          carryforward: rust,python
  run_docker_build_checks:
    name: Build check ${{ matrix.application }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - application: data-manager
            dockerfile: applications/data_manager/Dockerfile
          - application: portfolio-manager
            dockerfile: applications/portfolio_manager/Dockerfile
          - application: ensemble-manager
            dockerfile: applications/ensemble_manager/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.application }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
