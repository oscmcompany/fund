---
name: Continuous Deployment
run-name: Continuous Deployment

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  cd:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: pulumi
    concurrency:
      group: infrastructure-deployment
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
      - uses: DeterminateSystems/nix-installer-action@v16.0.0
      - uses: DeterminateSystems/magic-nix-cache-action@v7.0.0
        with:
          use-flakehub: false
      - name: Install devenv
        run: nix profile install nixpkgs#devenv
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_INFRASTRUCTURE_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Deploy
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: devenv tasks run checks:cd:deploy
