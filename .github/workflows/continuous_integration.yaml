---
name: Continuous integration
run-name: Continuous integration
on:
  pull_request:
permissions:
  contents: read
  pull-requests: read
jobs:
  ci:
    name: Continuous integration checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect changed file types
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Install devenv
        run: nix profile install nixpkgs#devenv
      - name: Cache Rust dependencies
        if: steps.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: false
          shared-key: rust-continuous-integration
          save-if: true
          add-rust-environment-hash-key: false
      - name: Cache llvm-cov artifacts
        if: steps.changes.outputs.rust == 'true'
        uses: actions/cache@v4
        with:
          path: target/llvm-cov-target
          key: llvm-cov-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            llvm-cov-${{ runner.os }}-
      - name: Run base checks
        run: >-
          devenv --secretspec-provider env --secretspec-profile development
          tasks run checks:base
      - name: Run Rust checks
        if: steps.changes.outputs.rust == 'true'
        env:
          SQLX_OFFLINE: "true"
        run: >-
          devenv --secretspec-provider env --secretspec-profile development
          tasks run checks:rust
