---
name: Bump dependencies
run-name: Bump dependencies
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  bump:
    name: Bump all dependency versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Bump dependencies and open pull request
        run: |
          devenv --secretspec-provider env --secretspec-profile development shell -- bash -c "
            bump-rust-dependencies
            if git diff --quiet Cargo.lock; then
              exit 0
            fi
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git checkout -B automated-dependency-bump
            git add Cargo.lock
            git commit -m 'Bump dependency versions'
            git push --force-with-lease origin automated-dependency-bump
            gh pr list --head automated-dependency-bump --json number --jq '.[0].number' \
              | grep -q . \
              || gh pr create \
                   --title 'Bump dependency versions' \
                   --body 'Automated daily dependency version bump. Updates Cargo.lock to latest compatible versions.' \
                   --label dependencies \
                   --base master
          "
        env:
          GH_TOKEN: ${{ github.token }}
