---
name: Label pull requests
run-name: Label pull requests
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  label_pull_request:
    name: Label pull request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Label pull request
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
