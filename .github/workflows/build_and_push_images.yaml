---
name: Build and push images
run-name: Build and push images to GHCR
on:
  push:
    branches:
      - master
  workflow_dispatch:
concurrency:
  group: ghcr-build-push
  cancel-in-progress: false
env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/oscmcompany/fund
jobs:
  build_and_push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: data-manager
            dockerfile: applications/data_manager/Dockerfile
            context: .
          - service: ensemble-manager
            dockerfile: applications/ensemble_manager/Dockerfile
            context: .
          - service: portfolio-manager
            dockerfile: applications/portfolio_manager/Dockerfile
            context: .
          - service: grafana
            dockerfile: dashboards/Dockerfile
            context: dashboards
          - service: tide-trainer
            dockerfile: models/tide/Dockerfile
            context: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
