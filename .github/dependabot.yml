---
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    groups:
      all-dependencies:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch", "minor"]
      all-security:
        applies-to: security-updates
        patterns: ["*"]
